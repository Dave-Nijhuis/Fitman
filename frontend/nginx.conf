server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html — never cache so browsers always load the latest entry point
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed assets — cache forever, Vite rotates the hash on every build
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /health to backend container
    location /health {
        proxy_pass http://backend:8000;
    }
}
